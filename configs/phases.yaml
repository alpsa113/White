# 3단계 학습 시나리오 설정

phase1:
  max_epochs: 30
  aux_active: true
  uncertainty_active: false
  fusion_reg_active: false
  allow_rgb_only: true
  allow_thm_only: true
  allow_pairs: true
  modality_dropout_prob: 0.2
  class_weights: [1.0, 1.0, 1.0, 0.1]
  datasets:
    - type: manifest
      root: .
      ann_file: data/manifests/phase1_train.json
  val_datasets:
    - type: manifest
      root: .
      ann_file: data/manifests/phase1_val.json

phase2:
  max_epochs: 20
  aux_active: true
  uncertainty_active: false   # 10 epoch부터 자동 활성화
  fusion_reg_active: true
  allow_rgb_only: false
  allow_thm_only: false
  allow_pairs: true
  modality_dropout_prob: 0.05
  class_weights: [1.0, 1.0, 1.0, 0.1]
  datasets:
    - type: manifest
      root: .
      ann_file: data/manifests/phase2_train.json
  val_datasets:
    - type: manifest
      root: .
      ann_file: data/manifests/phase2_val.json

phase3:
  max_epochs: 15
  aux_active: false
  uncertainty_active: true
  fusion_reg_active: true
  backbone_unfreeze_epoch: 8
  hard_negative_sampling:
    enabled: true
    small_box_area: 1024
    base_weight: 1.0
    weights:
      distant_person: 2.0
      small_non_target: 2.0
      non_target: 1.5
  allow_rgb_only: true
  allow_thm_only: true
  allow_pairs: true
  class_weights: [1.5, 1.0, 1.0, 0.05]   # person 클래스 가중치 상향
  datasets:
    - type: manifest
      root: .
      ann_file: data/manifests/phase3_train.json
  val_datasets:
    - type: manifest
      root: .
      ann_file: data/manifests/phase3_val.json
