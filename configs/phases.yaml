# 3단계 학습 시나리오 설정

phase1:
  max_epochs: 30
  aux_active: true
  uncertainty_active: false
  fusion_reg_active: false
  allow_rgb_only: true
  allow_thm_only: true
  allow_pairs: true
  modality_dropout_prob: 0.2
  class_weights: [1.0, 1.0, 1.0, 0.1]
  datasets:
    - type: manifest
      root: .
      ann_file: data/manifests/phase1_train.json
  val_datasets:
    - type: manifest
      root: .
      ann_file: data/manifests/phase1_val.json

phase2:
  max_epochs: 20
  aux_active: true
  uncertainty_active: false
  uncertainty_start_epoch: null
  fusion_reg_active: true
  allow_rgb_only: false
  allow_thm_only: false
  allow_pairs: true
  modality_dropout_prob: 0.05
  class_weights: [1.0, 1.0, 1.0, 0.1]
  datasets:
    - type: manifest
      root: .
      ann_file: data/manifests/phase2_train.json
  val_datasets:
    - type: manifest
      root: .
      ann_file: data/manifests/phase2_val.json

phase3:
  max_epochs: 20
  aux_active: false
  uncertainty_active: false
  uncertainty_start_epoch: null
  fusion_reg_active: true
  backbone_unfreeze_epoch: 6
  hard_negative_sampling:
    enabled: true
    small_box_area: 1600
    base_weight: 1.0
    weights:
      distant_person: 2.0
      small_non_target: 3.0
      non_target: 3.0
      empty_background: 1.5
  allow_rgb_only: true
  allow_thm_only: true
  allow_pairs: true
  class_weights: [1.5, 1.0, 1.0, 0.7]   # phase3 오탐 억제를 위해 non_target/empty 학습 강화
  datasets:
    - type: manifest
      root: .
      ann_file: data/manifests/phase3_train.json
  val_datasets:
    - type: manifest
      root: .
      ann_file: data/manifests/phase3_val.json
