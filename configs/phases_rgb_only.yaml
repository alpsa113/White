# RGB-only ablation 학습 설정입니다.
# Phase2는 RGB-TIR pair fusion 단계이므로 실행하지 않습니다.

phase1:
  max_epochs: 30
  aux_active: true
  uncertainty_active: false
  uncertainty_start_epoch: null
  fusion_reg_active: false
  allow_rgb_only: true
  allow_thm_only: false
  allow_pairs: false
  modality_dropout_prob: 0.0
  class_weights: [1.0, 1.0, 1.0, 0.1]
  datasets:
    - type: manifest
      root: .
      ann_file: data/manifests_rgb_only/phase1_train.json
  val_datasets:
    - type: manifest
      root: .
      ann_file: data/manifests_rgb_only/phase1_val.json

phase3:
  max_epochs: 15
  aux_active: false
  uncertainty_active: false
  uncertainty_start_epoch: null
  fusion_reg_active: false
  backbone_unfreeze_epoch: 8
  hard_negative_sampling:
    enabled: true
    small_box_area: 1024
    base_weight: 1.0
    weights:
      distant_person: 2.0
      small_non_target: 2.0
      non_target: 1.5
  allow_rgb_only: true
  allow_thm_only: false
  allow_pairs: false
  class_weights: [1.5, 1.0, 1.0, 0.05]
  datasets:
    - type: manifest
      root: .
      ann_file: data/manifests_rgb_only/phase3_train.json
  val_datasets:
    - type: manifest
      root: .
      ann_file: data/manifests_rgb_only/phase3_val.json
