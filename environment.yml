name: gop-acoustic
channels:
  - conda-forge
  - pytorch
  - nvidia
dependencies:
  - python=3.10
  # --- 딥러닝 (GPU: pytorch-cuda, CPU만이면 아래 줄 제거하고 cpuonly 사용) ---
  - pytorch
  - torchaudio
  - torchvision
  - pytorch-cuda=12.1   # GPU 없으면 이 줄 삭제, 대신 'cpuonly' 추가
  - lightning
  # --- 오디오 처리 ---
  - librosa            # 멜-스펙트로그램, 음향 특징 추출
  - soundfile          # 음원 입출력(wav/flac)
  # --- 데이터·과학 ---
  - numpy
  - pandas
  - scipy
  - scikit-learn
  # --- 시각화 ---
  - matplotlib
  # --- 서비스 ---
  - fastapi
  - uvicorn
  # --- 실험관리·유틸 ---
  - jupyter
  - tqdm
  - pyyaml
  - pip
  - pip:
      - audiomentations   # 오디오 데이터 증강(노이즈·시간이동 등)
      - wandb
